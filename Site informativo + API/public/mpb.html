<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPB - Transição Natural</title>
    
    <!-- Google Fonts: Fonte manuscrita/marcador para a placa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/mpb.css">
</head>
<body>
    <div class="parallax-container">
        
        <!-- Seção 1: Água do Mar (Fades out na base) -->
        <section class="section water"></section>

        <!-- Seção 2: Areia da Praia (Fades in no topo, fades out na base) -->
        <section class="section sand">
            <div class="badge-container">
                <div class="badge">
                    <h1>MPB</h1>
                </div>
            </div>
        </section>

        <!-- Seção 3: Calçadão de Copacabana (Fades in no topo) -->
        <section class="section copacabana"></section>
        
    </div>
</body>
</html>

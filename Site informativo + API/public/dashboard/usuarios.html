<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPB | Usuários</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="icon" href="../assets/icon/favicon2.ico">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background-color: var(--azul2);
        }

        th {
            color: var(--amarelo2);
            padding: 14px 16px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: var(--branco);
            padding: 14px 16px;
            font-size: 0.95rem;
            border-bottom: 1px solid #ffffff10;
        }

        tbody tr:hover {
            background-color: var(--azul);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            background-color: var(--verde2);
            color: var(--branco);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="container">
            <h1 class="titulo">Jorge Ben & Vinícius de Moraes</h1>
            <ul class="navbar">
                <li><a href="../index.html">Inicial</a></li>
                <li><a href="../simulador.html">Simulador</a></li>
                <li>|</li>
                <li class="agora">Dashboard</li>
            </ul>
        </div>
    </div>

    <div class="dash-wrapper">
        <aside class="dash-sidebar">
            <p class="saudacao">Bem-vindo,<span id="nome-usuario">visitante</span></p>
            <a href="./dashboards.html" class="btn-nav">Início</a>
            <a href="./graficos.html" class="btn-nav">Gráficos</a>
            <a href="./usuarios.html" class="btn-nav ativo">Usuários</a>
            <a href="./spotify.html" class="btn-nav">Álbuns</a>
            <a href="./perfil.html" class="btn-nav">Meu Perfil</a>
            <button class="btn-nav sair" onclick="sair()">Sair</button>
        </aside>

        <main class="dash-content">
            <h2 class="dash-titulo">Usuários cadastrados</h2>
            <p class="dash-subtitulo" id="total-label">Carregando...</p>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Estilo preferido</th>
                    </tr>
                </thead>
                <tbody id="tabela-usuarios"></tbody>
            </table>
        </main>
    </div>

    <div class="footer">
        <div class="container">
            <h4>Feito com amor por aluno ♥ SPTech © 2023</h4>
        </div>
    </div>

    <script>
        var usuario = JSON.parse(sessionStorage.getItem("usuarioLogado"));
        if (usuario && usuario.nome) document.getElementById("nome-usuario").textContent = usuario.nome;
        function sair() { sessionStorage.removeItem("usuarioLogado"); window.location.href = "../login.html"; }

        fetch("/usuarios").then(function (r) { return r.json(); }).then(function (dados) {
            document.getElementById("total-label").textContent = dados.length + " usuário(s) encontrado(s)";
            var tbody = document.getElementById("tabela-usuarios");
            dados.forEach(function (u) {
                tbody.innerHTML += `<tr>
                    <td>${u.id}</td>
                    <td>${u.nome}</td>
                    <td>${u.email}</td>
                    <td><span class="badge">${u.estilo || '-'}</span></td>
                </tr>`;
            });
        });
    </script>
</body>

</html>
